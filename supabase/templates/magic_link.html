<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sign in to VK Mentorship</title></head>
<body style="margin:0;padding:0;background:#f5f0e8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
<table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background:#f5f0e8;padding:40px 16px;">
  <tr><td align="center">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:560px;">

      <tr><td align="center" style="padding-bottom:28px;">
        <div style="display:inline-block;background:#0B2545;border-radius:16px;padding:12px 24px;">
          <span style="font-size:20px;font-weight:700;color:#ffffff;letter-spacing:-0.3px;">VK Mentorship</span>
        </div>
      </td></tr>

      <tr><td style="background:#ffffff;border-radius:20px;padding:36px 36px 28px;box-shadow:0 2px 16px rgba(0,0,0,0.06);">

        <h1 style="margin:0 0 8px;font-size:22px;font-weight:700;color:#0B2545;letter-spacing:-0.3px;">Sign in to VK Mentorship</h1>
        <p style="margin:0 0 24px;font-size:15px;color:#4a5568;line-height:1.6;">Click below to sign in. This link can only be used once and expires in 1 hour.</p>

        <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 0 24px;">
          <tr>
            <td align="center" style="border-radius:12px;background:#0B2545;">
              <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;padding:14px 32px;font-size:15px;font-weight:700;color:#ffffff;text-decoration:none;border-radius:12px;">
                Sign in →
              </a>
            </td>
          </tr>
        </table>

        <p style="margin:0 0 4px;font-size:12.5px;color:#8a93a3;">If you didn't request this sign-in link, you can safely ignore this email.</p>
        <p style="margin:0;font-size:12.5px;color:#8a93a3;">If the button doesn't work:<br>
          <a href="{{ .ConfirmationURL }}" style="color:#3b6fb0;word-break:break-all;">{{ .ConfirmationURL }}</a>
        </p>
      </td></tr>

      <tr><td align="center" style="padding:20px 0 0;">
        <p style="margin:0;font-size:12px;color:#9aa0ad;">© VK Mentorship · <a href="https://vkmentorship.com" style="color:#9aa0ad;text-decoration:none;">vkmentorship.com</a></p>
      </td></tr>

    </table>
  </td></tr>
</table>
</body>
</html>
