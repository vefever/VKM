project_id = "ehsbzxrekrhmmpvbxlfv"

[auth]
site_url = "https://vkmentorship.com"
additional_redirect_urls = [
  "https://vkmentorship.com/**",
  "http://localhost:3000/**",
  "http://localhost:5173/**"
]

[auth.email]
# INVITE-ONLY PLATFORM: public self-signup is disabled. Accounts are created
# exclusively by the admin invite flow (createUser, server-side). With this off,
# Supabase's /auth/v1/signup endpoint is rejected, so nobody can self-register
# even by calling the API directly. Must also be set in the hosted dashboard
# (Authentication → Providers → Email → "Allow new users to sign up" = off) —
# config.toml alone does not change the hosted project.
enable_signup = false
double_confirm_changes = true
enable_confirmations = false
